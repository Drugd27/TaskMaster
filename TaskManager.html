<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery UI -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <!-- DataTables-->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">

    <!--CSS -->
    <link rel="stylesheet" href="./style.css">

        <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- jQuery UI -->
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <!-- jQuery Validate -->
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- DataTables Buttons -->
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

    <!-- Export dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <script src="./script.js"></script>
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h1>Menedżer zadań</h2>
        <button id="darkModeBtn" class="btn btn-dark">🌙 Tryb ciemny</button>
    </div>

    <hr>

    <button id="toggleForm" class="btn btn-primary mb-3">➕ Dodaj zadanie</button>

    <div id="taskFormContainer" class="card p-3 mb-4">
        <form id="taskForm">
            <div class="mb-3">
                <label class="lbl">Nazwa zadania</label>
                <input type="text" name="title" class="form-control">
            </div>

            <div class="mb-3">
                <label class="lbl">Data wykonania</label>
                <input type="text" name="date" id="datePicker" class="form-control">
            </div>

            <div class="mb-3">
                <label class="lbl">Priorytet</label>
                <select name="priority" class="form-control">
                    <option>Wybierz</option>
                    <option>Wysoki</option>
                    <option>Średni</option>
                    <option>Niski</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success">Zapisz</button>
        </form>
    </div>

    <table id="taskTable" class="display">
        <thead>
        <tr>
            <th>Nazwa</th>
            <th>Data</th>
            <th>Priorytet</th>
            <th>Status</th>
            <th>Akcje</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>
</body>
</html>
